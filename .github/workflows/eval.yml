name: eval

on:
  push:
    branches: [main]
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # The eval harness has zero dependencies — no install step.
      # Live stage hits MusicBrainz/Wikidata at ~1 req/sec (etiquette-compliant).
      - run: npm run eval
