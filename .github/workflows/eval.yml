name: eval

on:
  push:
    branches: [main]
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # The eval imports the db layer (guard tests), so deps are needed now.
      # Live stage hits MusicBrainz/Wikidata at ~1 req/sec (etiquette-compliant).
      - run: npm ci
      - run: npm run eval
